<!DOCTYPE html>
<html>
<head>
    <title>Register - Study Buddy Finder</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #f4f4f4;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar {
            background-color: #3a3a3a;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 2px 8px rgba(0,0,0,0.2);
        }
        .navbar h1 {
            color: white;
            font-size: 20px;
            font-weight: 700;
        }
        .navbar h1 span { color: #F26522; }
        .navbar a {
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }
        .navbar a:hover { color: #F26522; }
        .content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }
        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.08);
            width: 380px;
            border-top: 4px solid #3a3a3a;
        }
        .logo {
            text-align: center;
            font-size: 20px;
            font-weight: 700;
            color: #2e2e2e;
            margin-bottom: 5px;
        }
        .subtitle {
            text-align: center;
            color: #888;
            font-size: 13px;
            margin-bottom: 20px;
        }
        label {
            font-size: 13px;
            color: #444;
            font-weight: 600;
            display: block;
            margin-bottom: 5px;
        }
        input {
            width: 100%;
            padding: 10px 14px;
            margin-bottom: 16px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 14px;
            font-family: 'Poppins', sans-serif;
            color: #333;
            transition: border 0.2s;
        }
        input:focus {
            outline: none;
            border-color: #3a3a3a;
        }
        button {
            width: 100%;
            padding: 12px;
            background-color: #F26522;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 15px;
            font-family: 'Poppins', sans-serif;
            cursor: pointer;
            font-weight: 600;
            transition: background 0.2s;
        }
        button:hover { background-color: #d4551a; }
        .error {
            background-color: #fdecea;
            color: #c0392b;
            padding: 10px;
            border-radius: 6px;
            font-size: 13px;
            margin-bottom: 15px;
            text-align: center;
            border-left: 4px solid #c0392b;
        }
        .note {
            background-color: #f5f5f5;
            color: #555;
            padding: 10px;
            border-radius: 6px;
            font-size: 12px;
            margin-bottom: 20px;
            text-align: center;
            border-left: 4px solid #F26522;
            font-weight: 500;
        }
        .footer-link {
            text-align: center;
            margin-top: 20px;
            font-size: 13px;
            color: #888;
        }
        .footer-link a {
            color: #F26522;
            text-decoration: none;
            font-weight: 600;
        }
        .footer-link a:hover { color: #d4551a; }
        footer {
            text-align: center;
            padding: 15px;
            font-size: 12px;
            background-color: #3a3a3a;
            color: #aaa;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>🎓 Study Buddy  <span>Finder</span></h1>
        <a href="/">← Back to Home</a>
    </div>

    <div class="content">
        <div class="card">
            <div class="logo">Create Account</div>
            <div class="subtitle">Join the UTRGV Study Buddy Finder community</div>

            <div class="note">📧 A valid .edu email address is required to register</div>

            {% if error %}
                <div class="error">{{ error }}</div>
            {% endif %}

            <form method="POST">
                {% csrf_token %}
                <label>Username</label>
                <input type="text" name="username" placeholder="Choose a username" required>
                <label>Email</label>
                <input type="email" name="email" placeholder="yourname@utrgv.edu" required>
                <label>Password</label>
                <input type="password" name="password1" placeholder="Create a password" required>
                <label>Confirm Password</label>
                <input type="password" name="password2" placeholder="Confirm your password" required>
                <button type="submit">Create Account</button>
            </form>

            <div class="footer-link">
                Already have an account? <a href="/login/">Log In</a>
            </div>
        </div>
    </div>

    <footer>© 2026 Study Buddy Finder · Built for UTRGV Students</footer>
</body>
</html>
